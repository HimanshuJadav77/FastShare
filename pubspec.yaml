name: wifi_ftp
description: "High-performance Wi-Fi File Transfer for Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Network & Device
  network_info_plus: ^6.0.0
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.3
  multicast_dns: ^0.3.2+4

  # Storage & Permissions
  permission_handler: ^12.0.1
  path_provider: ^2.1.3
  file_picker: ^10.3.10
  shared_preferences: ^2.2.3

  # Utilities
  crypto: ^3.0.7
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  logging: ^1.2.0

  # UI
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_blue_plus: ^2.2.1
  wifi_iot: ^0.3.19+2
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
